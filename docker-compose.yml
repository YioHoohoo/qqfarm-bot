services:
  qq-farm-bot-ui:
    build:
      context: .
      dockerfile: core/Dockerfile
    container_name: qq-farm-bot-ui
    restart: unless-stopped
    init: true
    stop_signal: SIGTERM
    stop_grace_period: 15s
    environment:
      ADMIN_PASSWORD: admin
      TZ: Asia/Shanghai
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/core/data
